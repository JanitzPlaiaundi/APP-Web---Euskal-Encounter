<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Euskal Encounter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../../Recursos/CssConjuntos/header.css">
    <link rel="stylesheet" href="../../Recursos/CssConjuntos/footer.css">
    <link rel="stylesheet" href="InicioSesionRegistrarse.css">
    <script src="InicioSesionRegistrarse.js" defer></script>
</head>
<body class="bg-light">

    <div id="alerta" class="alerta-warning">
        <svg class="alerta-icono" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
        </svg>
        <span class="alertText"></span>
    </div>
    
    <main class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="width: 100%; max-width: 420px;">

            <ul class="nav nav-tabs mb-3" id="loginTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active w-100" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">
                        Iniciar sesión
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link w-100" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">
                        Registrarse
                    </button>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="login">
                    <form id="f-login">
                        <div class="mb-1">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" id="log-email" class="form-control" placeholder="correo@ejemplo.com" required>
                        </div>
                        <div class="mb-1">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="log-pass" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register">
                    <form id="f-register">
                        
                        <div class="mb-1">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="reg-nom-completo" class="form-control" placeholder="Nombre" required>
                        </div>
                        <div class="mb-1">
                            <label class="form-label">Apellido</label>
                            <input type="text" id="reg-apellido" class="form-control" placeholder="Apellido" required>
                        </div>
                        <div class="mb-1">
                            <label class="form-label">DNI</label>
                            <input type="text" id="reg-dni" class="form-control" placeholder="DNI" required>
                        </div>
                        <div class="mb-1">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" id="reg-email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="mb-1">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="reg-pass1" class="form-control" placeholder="Contraseña" required>
                        </div>
                        <div class="mb-1">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" id="reg-pass2" class="form-control" placeholder="Confirmar contraseña" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Crear cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
